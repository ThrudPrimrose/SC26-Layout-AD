cache: name
call_hooks: ''
compiled_sdfg_call_hooks: ''
compiler:
  allow_shadowing: false
  allow_view_arguments: false
  build_type: Release
  codegen_lineinfo: false
  codegen_state_struct_suffix: _state_t
  cpu:
    args: -Wconversion -Wno-sign-conversion -Wfloat-conversion -Wno-unknown-pragmas
      -faligned-new -DDACE_VELOCITY_DEBUG -std=c++20 -Wall -Wextra -Wno-unused-parameter
      -Wno-unused-variable -Wno-unknown-pragmas -O0 -g -ggdb  -fopenmp
    executable: g++
    libs: ''
    openmp_sections: false
  cuda:
    args: --diag-suppress 68 --diag-suppress 550 --diag-suppress 20208 --diag-suppress
      1835 --diag-suppress 177 --diag-suppress 20012 --diag-suppress 1098 -Xcompiler=-Wconversion
      -Xcompiler=-Wsign-conversion -Xcompiler=-Wfloat-conversion -Xcompiler=-Wno-unknown-pragmas
      -Xcompiler=-faligned-new -Xcompiler=-Wall -Xcompiler=-Wextra -Xcompiler=-fopenmp
      --expt-relaxed-constexpr -arch=sm_90a -O0 -Xcompiler=-g -g -Xcompiler=-O0 -G  --fmad=false
      --prec-div=true --prec-sqrt=true --ftz=false -DDACE_VELOCITY_DEBUG -Xcompiler=-DDACE_VELOCITY_DEBUG
      -std=c++20
    backend: auto
    block_size_lastdim_limit: 64
    block_size_limit: 1024
    cuda_arch: '35'
    default_block_size: 32,16,1
    dynamic_map_block_size: 128,1,1
    dynamic_map_fine_grained: true
    hip_arch: gfx906
    hip_args: -std=c++17 -fPIC -O3 -ffast-math -Wno-unused-parameter
    implementation: legacy
    libs: ''
    max_concurrent_streams: '1'
    mempool_release_threshold: -1
    path: ''
    persistent_map_SM_fraction: 1.0
    persistent_map_occupancy: 2
    syncdebug: false
    thread_id_type: int32
  default_data_types: C
  extra_cmake_args: ''
  format_code: false
  format_config_file: ''
  fpga:
    autobuild_bitstreams: true
    concurrent_kernel_detection: false
    minimum_fifo_depth: ''
    vendor: xilinx
  indentation_spaces: 4
  inline_sdfgs: false
  intel_fpga:
    board: a10gx
    enable_debugging: false
    host_flags: -Wno-unknown-pragmas
    kernel_flags: -fp-relaxed -cl-no-signed-zeros -cl-fast-relaxed-math -cl-single-precision-constant
    mode: emulator
    path: ''
  library_extension: so
  library_prefix: lib
  linker:
    args: -Wl,--disable-new-dtags
    executable: g++
  max_stack_array_size: 65536
  mpi:
    executable: mpicxx
  rtl:
    verbose: false
    verilator_enable_debug: false
    verilator_flags: ''
    verilator_lint_warnings: true
  unique_functions: hash
  use_cache: false
  xilinx:
    build_flags: ''
    decouple_array_interfaces: false
    enable_debugging: false
    frequency: ''
    host_flags: -Wno-unknown-pragmas -Wno-unused-label
    mode: simulation
    path: ''
    platform: xilinx_u280_xdma_201920_1
    synthesis_flags: -std=c++11
debugprint: true
default_build_folder: .dacecache
experimental:
  check_race_conditions: false
  validate_undefs: false
frontend:
  avoid_wcr: false
  cache_size: 32
  check_args: false
  dont_fuse_callbacks: false
  implicit_recursion_depth: 64
  preprocessing_passes: 5
  raise_nested_parsing_errors: false
  typed_callbacks_only: false
  unroll_threshold: -1
  verbose_errors: false
instrumentation:
  papi:
    default_counters: '[''PAPI_TOT_INS'', ''PAPI_TOT_CYC'', ''PAPI_L2_TCM'', ''PAPI_L3_TCM'']'
    overhead_compensation: true
    vectorization_analysis: false
  print_fpga_runtime: false
  report_each_invocation: true
library:
  blas:
    default_implementation: pure
    fpga:
      default_stream_depth: 32
    override: false
  lapack:
    default_implementation: OpenBLAS
    override: false
  linalg:
    default_implementation: OpenBLAS
    override: false
  pblas:
    default_implementation: MKLMPICH
    override: false
optimizer:
  automatic_simplification: true
  autooptimize: false
  autospecialize: false
  autotile_partial_parallelism: true
  autotile_size: 128
  detect_control_flow: true
  match_exception: false
  save_intermediate: false
  symbolic_positive: true
  visualize_sdfv: false
profiling: false
profiling_status: true
progress: true
store_history: true
testing:
  deserialize_exception: false
  serialization: false
  serialize_all_fields: false
treps: 100
